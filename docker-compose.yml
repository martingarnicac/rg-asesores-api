version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rg-asesores-api-postgres
    restart: always
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-rguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rgpassword}
      POSTGRES_DB: ${DB_NAME:-rg_contracts}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-rguser} -d ${DB_NAME:-rg_contracts}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rg-asesores-api
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-rguser}
      DB_PASSWORD: ${DB_PASSWORD:-rgpassword}
      DB_NAME: ${DB_NAME:-rg_contracts}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev

volumes:
  postgres_data:
